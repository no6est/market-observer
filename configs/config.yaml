tickers:
  - NVDA
  - MSFT
  - GOOGL
  - SNOW
  - CRWD
  - DDOG
  - PLTR
  - NET
  - MDB
  - PATH
  # 非AI銘柄（ナラティブ多様性確保）
  - XOM    # エネルギー
  - JPM    # 金融
  - UNH    # ヘルスケア
  - LMT    # 防衛・地政学
  - NEE    # 公益・エネルギー転換

rss_feeds:
  - name: TechCrunch
    url: https://techcrunch.com/feed/
  - name: ArsTechnica
    url: https://feeds.arstechnica.com/arstechnica/index
  - name: TheVerge
    url: https://www.theverge.com/rss/index.xml
  # 非テック系（ナラティブ多様性確保）
  - name: ReutersBusiness
    url: https://www.reutersagency.com/feed/?best-topics=business-finance
  - name: CNBC
    url: https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114
  - name: MarketWatch
    url: https://feeds.content.dowjones.io/public/rss/mw_topstories

reddit:
  subreddits:
    - wallstreetbets
    - stocks
    - technology
    - investing
    - energy
  limit_per_sub: 50

hackernews:
  enabled: true
  min_score: 10
  limit: 100

detection:
  lookback_days: 20
  z_threshold: 2.0
  cooldown_hours: 24
  max_anomalies_per_report: 10

report:
  output_dir: reports
  top_n_anomalies: 5
  top_n_themes: 5

sector_map:
  AI_Infrastructure:
    - NVDA
    - GOOGL
    - MSFT
    - AMD
    - SMCI
  Cloud_Security:
    - CRWD
    - PANW
    - ZS
    - FTNT
  Data_Platform:
    - SNOW
    - DDOG
    - MDB
    - ESTC
  Enterprise_AI:
    - PLTR
    - PATH
    - AI
    - BBAI
  Cloud_Networking:
    - NET
    - ANET
    - CSCO
  Energy:
    - XOM
    - CVX
    - NEE
    - SLB
  Financial:
    - JPM
    - GS
    - MS
    - BLK
  Healthcare:
    - UNH
    - JNJ
    - PFE
    - ABBV
  Defense_Geopolitics:
    - LMT
    - RTX
    - NOC
    - GD

database:
  path: data/market_obs.db

gemini:
  enabled: true
  model: gemini-3-flash-preview
  # api_key: set via GEMINI_API_KEY env var or uncomment below
  # api_key: "your-api-key-here"

narrative:
  ai_threshold: 0.3
  overheat_ai_pct: 0.5
  overheat_streak_days: 3
  concentration_warning_pct: 0.6
  top_n_non_ai: 3
  narrative_basis: all_events
  overheat_delta_threshold: 0.15
  overheat_evidence_threshold: 0.3

baseline:
  windows: [7, 30, 90]
  z_threshold: 2.0
  min_samples: 3

regime:
  vol_threshold: 0.25
  declining_threshold: 0.50

echo_chamber:
  similarity_threshold: 0.7
  min_correction: 0.5

narrative_track:
  keyword_overlap_threshold: 0.5
  ticker_overlap_threshold: 0.3
  cooling_inactive_days: 3
  weak_drift_z_threshold: 1.2
  weak_drift_category_ratio: 0.30
  use_embeddings: false
