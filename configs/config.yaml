database:
  path: data/market_obs.db

gemini:
  enabled: true
  model: gemini-3-flash-preview
  # api_key: set via GEMINI_API_KEY env var or uncomment below
  # api_key: "your-api-key-here"

narrative:
  ai_threshold: 0.3
  overheat_ai_pct: 0.5
  overheat_streak_days: 3
  concentration_warning_pct: 0.6
  top_n_non_ai: 3
  narrative_basis: all_events
  overheat_delta_threshold: 0.15
  overheat_evidence_threshold: 0.3

baseline:
  windows: [7, 30, 90]
  z_threshold: 2.0
  min_samples: 3

regime:
  vol_threshold: 0.25
  declining_threshold: 0.50

echo_chamber:
  similarity_threshold: 0.7
  min_correction: 0.5
