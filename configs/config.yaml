reddit:
  subreddits:
    - wallstreetbets
    - stocks
    - technology
    - investing
    - energy
  limit_per_sub: 50

hackernews:
  enabled: true
  min_score: 10
  limit: 100

detection:
  lookback_days: 20
  z_threshold: 2.0
  cooldown_hours: 24
  max_anomalies_per_report: 10

report:
  output_dir: reports
  top_n_anomalies: 5
  top_n_themes: 5

