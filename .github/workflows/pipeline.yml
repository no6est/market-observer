name: Pipeline

on:
  schedule:
    - cron: "0 22 * * *"   # daily  — JST 7:00
    - cron: "0 0 * * 6"    # weekly — JST 9:00 Saturday
    - cron: "0 1 1 * *"    # monthly — JST 10:00 1st of month
  workflow_dispatch:
    inputs:
      pipeline:
        description: "Pipeline to run"
        type: choice
        options:
          - daily
          - weekly
          - monthly

permissions:
  contents: write

env:
  PIPELINE: >-
    ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pipeline
    || (github.event.schedule == '0 22 * * *' && 'daily')
    || (github.event.schedule == '0 0 * * 6' && 'weekly')
    || (github.event.schedule == '0 1 1 * *' && 'monthly')
    || 'daily' }}

jobs:
  run:
    runs-on: ubuntu-latest
    outputs:
      pipeline: ${{ env.PIPELINE }}
      report_date: ${{ env.REPORT_DATE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Prepare directories
        run: mkdir -p data reports

      - name: Download DB from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download db-snapshot --pattern market_obs.db --dir data/ || true

      - name: Set report date
        run: echo "REPORT_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Running pipeline: $PIPELINE (date: $REPORT_DATE)"
          if [ "$PIPELINE" = "daily" ]; then
            python -m app run-daily --date "$REPORT_DATE"
          elif [ "$PIPELINE" = "weekly" ]; then
            python -m app run-weekly --date "$REPORT_DATE"
          elif [ "$PIPELINE" = "monthly" ]; then
            python -m app run-monthly --date "$REPORT_DATE"
          fi

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view db-snapshot || \
            gh release create db-snapshot --title "DB Snapshot" --notes "Auto-managed SQLite snapshot"

      - name: Upload DB to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload db-snapshot data/market_obs.db --clobber

      - name: Collect report files
        run: |
          mkdir -p _output
          if [ "$PIPELINE" = "daily" ]; then
            cp -v reports/${REPORT_DATE}_structural.md _output/ 2>/dev/null || true
          elif [ "$PIPELINE" = "weekly" ]; then
            cp -v reports/${REPORT_DATE}_weekly.md _output/ 2>/dev/null || true
            cp -v reports/${REPORT_DATE}_narrative_trend.png _output/ 2>/dev/null || true
            cp -v reports/${REPORT_DATE}_media_diffusion.png _output/ 2>/dev/null || true
          elif [ "$PIPELINE" = "monthly" ]; then
            cp -v reports/${REPORT_DATE}_monthly.md _output/ 2>/dev/null || true
            cp -v reports/${REPORT_DATE}_reaction_lag.png _output/ 2>/dev/null || true
          fi
          ls -la _output/

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ env.PIPELINE }}-${{ env.REPORT_DATE }}
          path: _output/
          retention-days: 30
          if-no-files-found: warn

  deploy:
    needs: run
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: report-${{ needs.run.outputs.pipeline }}-${{ needs.run.outputs.report_date }}
          path: _incoming/

      - name: Fix image paths in markdown
        run: |
          for f in _incoming/*.md; do
            sed -i 's|](reports/|](|g' "$f"
          done

      - name: Copy reports to site root
        run: cp -v _incoming/* ./ 2>/dev/null || true && rm -rf _incoming/

      - name: Generate index page
        run: |
          python3 << 'PYEOF'
          import glob, re, os
          from collections import defaultdict

          files = sorted(glob.glob("*.md"), reverse=True)
          files = [f for f in files if f != "index.md"]

          by_date = defaultdict(list)
          for f in files:
              m = re.match(r"(\d{4}-\d{2}-\d{2})_(.+)\.md", f)
              if m:
                  date, label = m.group(1), m.group(2).replace("_", " ").title()
                  by_date[date].append((label, f))

          lines = ["---", "title: Report Index", "---", "", "# Market Observer Reports", ""]
          for date in sorted(by_date.keys(), reverse=True):
              lines.append(f"## {date}")
              for label, fname in sorted(by_date[date]):
                  lines.append(f"- [{label}]({fname})")
              lines.append("")

          if not by_date:
              lines.append("No reports yet. Run the pipeline to generate reports.")

          with open("index.md", "w") as fh:
              fh.write("\n".join(lines) + "\n")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "deploy: ${{ needs.run.outputs.pipeline }} report ${{ needs.run.outputs.report_date }}"
          git push origin gh-pages
